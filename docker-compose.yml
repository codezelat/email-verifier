services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - verifier_data:/code/data
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: emailverifier
      POSTGRES_USER: verifier
      POSTGRES_PASSWORD: verifier_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verifier -d emailverifier"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  verifier_data:
  postgres_data:
